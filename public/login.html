<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opscale Portal Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/login.css">
</head>
<body>
  <div class="flex-center-row">
    <div class="ghost-art">
      <svg width="96" height="96" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="32" cy="40" rx="20" ry="18" fill="#fff" stroke="#bbb" stroke-width="2"/>
        <ellipse cx="32" cy="28" rx="16" ry="18" fill="#fff" stroke="#bbb" stroke-width="2"/>
        <ellipse cx="24" cy="30" rx="2.5" ry="4" fill="#222"/>
        <ellipse cx="40" cy="30" rx="2.5" ry="4" fill="#222"/>
        <path d="M24 44 Q32 50 40 44" stroke="#bbb" stroke-width="2" fill="none"/>
      </svg>
    </div>
    <div class="login-container">
    <div class="logo">
      <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/microsoftazure.svg" alt="Opscale Logo" />
    </div>
    <h2>Opscale Portal</h2>
    <div class="subtitle">Sign in to continue</div>
    <form id="loginForm">
      <label>Email
        <input type="email" name="email" required autocomplete="username">
      </label>
      <label>Password
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      <button type="submit">Sign In</button>
      <div class="message" id="message"></div>
      <div style="margin-top:1em;">
        <a href="/register.html" style="color:#1877F2;text-decoration:none;font-size:0.98em;">Sign up</a>
        &nbsp;|&nbsp;
        <a href="#" style="color:#1877F2;text-decoration:none;font-size:0.98em;opacity:0.6;cursor:not-allowed;">Forgot password?</a>
        <br><br>
        <span style="font-size:0.95em;color:#b0b3b8;">You can use this login page for both local (localhost:4000) and production (hdhtransport.com) environments. Just ensure the backend API URL is correct in production.</span>
      </div>
    </form>
    <div style="margin-top:1.5em;font-size:0.95em;color:#b0b3b8;">By signing in you agree to the Opscale terms and privacy policy.</div>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = this.email.value.trim();
      const password = this.password.value.trim();
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const msg = document.getElementById('message');
      if (res.ok) {
        const data = await res.json();
        msg.textContent = 'Login successful! Redirecting...';
        msg.style.color = 'green';
        if (data.token) {
          localStorage.setItem('jwt', data.token);
        }
        setTimeout(function() {
          window.location.href = '/dashboard.html';
        }, 1200);
      } else {
        const data = await res.json();
        msg.textContent = data.message || data.error || 'Invalid email or password';
        msg.style.color = '#ff4d4f';
      }
    });
  </script>
</body>
</html>
