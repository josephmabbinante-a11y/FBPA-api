<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="stylesheet" href="/login.css">
</head>
<body>
  <div class="login-container">
    <h2>Reset Password</h2>
    <form id="resetForm">
      <label>Email
        <input type="email" name="email" autocomplete="email" required>
      </label>
      <label>Current Password
        <input type="password" name="currentPassword" autocomplete="current-password" required>
      </label>
      <label>New Password
        <input type="password" name="newPassword" autocomplete="new-password" required>
      </label>
      <button type="submit" id="resetSubmit">Reset Password</button>
      <div class="message" id="message"></div>
    </form>
  </div>
  <script>
    let resetAttempts = 0;
    const MAX_ATTEMPTS = 5;
    const COOLDOWN_MS = 60 * 1000;
    let lastAttemptTime = 0;

    document.getElementById('resetForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = this.email.value.trim();
      const currentPassword = this.currentPassword.value;
      const newPassword = this.newPassword.value;
      const msg = document.getElementById('message');
      const submitBtn = document.getElementById('resetSubmit');

      const now = Date.now();
      if (resetAttempts >= MAX_ATTEMPTS && (now - lastAttemptTime) < COOLDOWN_MS) {
        msg.textContent = 'Too many reset attempts. Please wait a minute before trying again.';
        msg.style.color = 'red';
        return;
      }

      if (!email || !currentPassword || !newPassword) {
        msg.textContent = 'Email, current password, and new password are required.';
        msg.style.color = 'red';
        return;
      }

      submitBtn.disabled = true;
      msg.textContent = '';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ email, currentPassword, newPassword })
        });
        lastAttemptTime = Date.now();
        resetAttempts += 1;

        if (res.ok) {
          msg.textContent = 'Password reset successful!';
          msg.style.color = 'green';
          resetAttempts = 0;
        } else {
          let data;
          try {
            data = await res.json();
          } catch {
            data = {};
          }
          msg.textContent = data.error || 'Password reset failed.';
          msg.style.color = 'red';
        }
      } catch (err) {
        msg.textContent = 'Network error. Please try again.';
        msg.style.color = 'red';
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
